<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App Macedonia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="headcontainer">
        <div id="searchbar">
            <input type="text" placeholder="Пребарај град..." id="inputCity">
            <button id="searchBtn" type="submit" onclick="searchCity()">Пребарај</button>
        </div>

        <div id="clock">
            
        </div>

        <div id="icon">
            <img src="sonce.svg" alt="Macedonian Sun">
        </div>

        <img src="WeatherHead.jpg" alt="WeatherPic">
        <p id="title">Времето во Македонија</p>
        <p id="date"></p>
    </div>

    <div class="card-Container">

    </div>



    <script src="script.js"></script>
</body>
</html>
